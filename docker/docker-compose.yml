services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: kb-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-knowledge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowledge_secret}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_base}
    volumes:
      - kb_pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knowledge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kb-network

  ollama:
    image: ollama/ollama:latest
    container_name: kb-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    volumes:
      - kb_ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - kb-network

  traefik:
    image: traefik:v3.3
    container_name: kb-traefik
    restart: unless-stopped
    profiles:
      - dashboard
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - kb-network

  dashboard:
    build:
      context: ../
      dockerfile: apps/dashboard/Dockerfile
    container_name: kb-dashboard
    restart: unless-stopped
    profiles:
      - dashboard
    ports:
      - "${DASHBOARD_PORT:-3847}:3847"
    environment:
      NODE_ENV: production
      DASHBOARD_PORT: "3847"
      DATABASE_URL: postgresql://${POSTGRES_USER:-knowledge}:${POSTGRES_PASSWORD:-knowledge_secret}@kb-postgres:5432/${POSTGRES_DB:-knowledge_base}
      OLLAMA_HOST: http://kb-ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-all-minilm}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`kb.localhost`)
      - traefik.http.routers.dashboard.entrypoints=web
      - traefik.http.services.dashboard.loadbalancer.server.port=3847
    networks:
      - kb-network

volumes:
  kb_pgdata:
  kb_ollama:

networks:
  kb-network:
    driver: bridge
