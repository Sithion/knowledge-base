name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['feature/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run tests
        run: cd packages/tests && npx playwright test --reporter=list
      - name: Dry-run npm publish
        run: cd apps/mcp-server && npm publish --dry-run
