name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['feature/**']

jobs:
  version-check:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Get PR version
        id: pr
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v5
        with:
          ref: main
          path: main-branch
      - name: Get main version
        id: main
        run: echo "version=$(node -p "require('./main-branch/package.json').version")" >> $GITHUB_OUTPUT
      - name: Check version was bumped
        run: |
          if [ "${{ steps.pr.outputs.version }}" = "${{ steps.main.outputs.version }}" ]; then
            echo "::error::Version not bumped! PR version (${{ steps.pr.outputs.version }}) is the same as main. Bump the version in all package.json files and Cargo.toml before merging."
            exit 1
          fi
          echo "Version bumped: ${{ steps.main.outputs.version }} → ${{ steps.pr.outputs.version }}"

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run tests
        run: cd packages/tests && npx playwright test --reporter=list
      - name: Dry-run npm publish
        run: cd apps/mcp-server && npm publish --dry-run
