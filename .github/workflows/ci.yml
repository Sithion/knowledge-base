name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['feature/**']

jobs:
  version-check:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Get PR version
        id: pr
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          path: main-branch
      - name: Get main version
        id: main
        run: echo "version=$(node -p "require('./main-branch/package.json').version")" >> $GITHUB_OUTPUT
      - name: Check version was bumped
        run: |
          if [ "${{ steps.pr.outputs.version }}" = "${{ steps.main.outputs.version }}" ]; then
            echo "::error::Version not bumped! PR version (${{ steps.pr.outputs.version }}) is the same as main. Bump the version in all package.json files and Cargo.toml before merging."
            exit 1
          fi
          echo "Version bumped: ${{ steps.main.outputs.version }} → ${{ steps.pr.outputs.version }}"

  validate-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Validate external dependency URLs
        run: |
          FAILED=0
          check_url() {
            STATUS=$(curl -sIL -o /dev/null -w "%{http_code}" "$1" --max-time 15 2>/dev/null)
            if [ "$STATUS" != "200" ]; then
              echo "::error::$2 returned HTTP $STATUS: $1"
              FAILED=1
            else
              echo "✓ $2 (HTTP $STATUS)"
            fi
          }
          check_url "https://ollama.com/install.sh" "Ollama install script"
          check_url "https://api.github.com/repos/Sithion/cognistore/releases/latest" "GitHub Releases API"
          if [ "$FAILED" -ne 0 ]; then exit 1; fi

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run tests
        run: cd packages/tests && npx playwright test --reporter=list
      - name: Dry-run npm publish (fail on warnings)
        run: |
          OUTPUT=$(cd apps/mcp-server && npm publish --dry-run --access public 2>&1)
          echo "$OUTPUT"
          WARNINGS=$(echo "$OUTPUT" | grep "npm warn publish" | grep -v "script name was cleaned" | grep -v "auto-corrected some errors" | grep -v "errors corrected" || true)
          if [ -n "$WARNINGS" ]; then
            echo "$WARNINGS"
            echo "::error::npm publish dry-run produced warnings. Fix package.json before merging."
            exit 1
          fi
